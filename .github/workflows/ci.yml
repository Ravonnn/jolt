name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Run corpus harness
        run: cargo test -p jolt-harness run_corpus

      - name: Test corpus harness
        run: cargo test -p jolt-harness test_corpus

      - name: Tutorial corpus harness
        run: cargo test -p jolt-harness tutorial_corpus

      - name: Pipeline smoke
        run: cargo run -p xtask -- pipeline-smoke

      - name: Learn verify
        run: cargo run -p xtask -- learn verify

      - name: jolt-learn-runner tests
        run: cargo test -p jolt-learn-runner

      - name: joltlings tests
        run: cargo test -p joltlings

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install mdbook
        run: cargo install mdbook --locked

      - name: Build documentation
        run: cargo xtask docs build
