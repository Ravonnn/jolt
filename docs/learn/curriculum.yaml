# Jolt Learn — curriculum manifest
# Single source of truth for lesson ordering, snippets, and CI verification.

editions:
  tiny:
    compiler_phase: "3c"
    commands:
      - check
      - fmt
      - run --interpret
      - test
  core:
    compiler_phase: "4+"
    commands:
      - check
      - fmt
      - run --interpret
      - test
  full:
    compiler_phase: "year-3+"
    commands: []

paths:
  beginner:
    description: Complete beginner — start from Hello World
    modules:
      - getting-started
      - custodian-intro
      - control-flow
      - testing
  examples:
    description: Learn by short, runnable examples
    modules:
      - by-example
  exercises:
    description: Hands-on drills with Joltlings
    modules:
      - joltlings

modules:
  getting-started:
    lessons:
      - tour-01-hello
      - tour-02-bindings
      - tour-03-functions
  custodian-intro:
    lessons:
      - tour-04-custodian
      - tour-04-borrow-shared
  control-flow:
    lessons:
      - tour-05-structs
      - tour-06-if-else
      - tour-06-loop
      - tour-06-for
  testing:
    lessons:
      - tour-11-testing
  by-example:
    lessons: [] # populated via examples/*.md index

lessons:
  - id: tour-01-hello
    file: learn/tour/01-hello.md
  - id: tour-02-bindings
    file: learn/tour/02-bindings.md
  - id: tour-03-functions
    file: learn/tour/03-functions.md
  - id: tour-04-custodian
    file: learn/tour/04-custodian.md
  - id: tour-04-borrow-shared
    file: learn/tour/04-borrow-shared.md
  - id: tour-05-structs
    file: learn/tour/05-structs.md
  - id: tour-06-if-else
    file: learn/tour/06-if-else.md
  - id: tour-06-loop
    file: learn/tour/06-loop.md
  - id: tour-06-for
    file: learn/tour/06-for.md
  - id: tour-11-testing
    file: learn/tour/11-testing.md

