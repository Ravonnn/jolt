# Custodian quiz 1 — Ownership basics

> Concept check before coding. Answers at the bottom.

## Question 1

After `$b = a` where `a` and `b` are `String`, can you still use `a`?

- A) Yes, always
- B) No — ownership moved to `b`
- C) Only with `borrow`

**Answer:** B — `String` is move-only in Tiny.

## Question 2

How many shared `borrow` references to the same `String` can exist at once (with no active `claim`)?

- A) One
- B) Two
- C) Many

**Answer:** C — multiple shared borrows are allowed.

## Question 3

Which types copy freely without move semantics in Tiny?

- A) `String` only
- B) `Int` and `Bool`
- C) All types

**Answer:** B

